<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Packer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { overflow: hidden; }

        /* Layout */
        #sidebar {
            width: 320px;
            min-width: 320px;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid var(--bs-border-color);
        }
        #preview {
            flex: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bs-secondary-bg);
            overflow: auto;
            padding: 1.5rem;
        }
        #outputSvg {
            max-width: 100%;
            max-height: 100%;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,.12);
            border-radius: 4px;
        }

        /* Mode toggle */
        #modeToggle .btn { flex: 1; }

        /* Hue slider */
        .hue-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 10px;
            border-radius: 5px;
            padding: 0;
            border: none;
            outline: none;
            background: linear-gradient(to right,
                hsl(0,100%,50%), hsl(30,100%,50%), hsl(60,100%,50%),
                hsl(90,100%,50%), hsl(120,100%,50%), hsl(150,100%,50%),
                hsl(180,100%,50%), hsl(210,100%,50%), hsl(240,100%,50%),
                hsl(270,100%,50%), hsl(300,100%,50%), hsl(330,100%,50%),
                hsl(360,100%,50%));
        }
        .hue-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: white;
            border: 2px solid #444;
            cursor: pointer;
            box-shadow: 0 1px 3px rgba(0,0,0,.3);
        }

        /* Zone panels */
        .zone-swatch {
            display: inline-block;
            width: 14px; height: 14px;
            border-radius: 3px;
            border: 1px solid rgba(0,0,0,.2);
            flex-shrink: 0;
        }
        .zone-card { margin-bottom: .5rem; }
        .zone-card .card-header {
            padding: .4rem .75rem;
            font-size: .85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .zone-card .card-body { padding: .6rem .75rem; }
        .zone-range { margin-left: auto; font-weight: 400; font-size: .75rem; color: var(--bs-secondary-color); }

        /* Compact form rows */
        .compact-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem; }
        .compact-row label { min-width: 54px; font-size: .8rem; margin: 0; white-space: nowrap; }
        .compact-row .form-range { flex: 1; }
        .compact-row .val { font-size: .75rem; color: var(--bs-secondary-color); min-width: 32px; text-align: right; }
        .compact-row .form-control, .compact-row .form-select { flex: 1; padding: .25rem .5rem; font-size: .85rem; }

        /* Neutral zone threshold row */
        .neutral-thresh-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
        .neutral-thresh-row label { min-width: 54px; font-size: .8rem; margin: 0; }
        .neutral-thresh-row .form-range { flex: 1; }
        .neutral-thresh-row .val { font-size: .75rem; color: var(--bs-secondary-color); min-width: 28px; text-align: right; }

        /* Section label */
        .section-label {
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--bs-secondary-color);
            margin-bottom: .35rem;
        }
    </style>
</head>
<body class="d-flex">

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<!-- Sidebar -->
<div id="sidebar" class="bg-body p-3">
    <h5 class="fw-bold mb-3">Circle Packer</h5>

    <!-- Image upload -->
    <div class="mb-3">
        <label class="form-label section-label">Image</label>
        <input type="file" id="imageUpload" class="form-control form-control-sm" accept="image/png,image/jpeg">
    </div>

    <!-- Threshold -->
    <div class="mb-3">
        <label class="section-label">Threshold <span class="float-end fw-normal" id="thresholdVal">128</span></label>
        <input type="range" id="threshold" class="form-range" min="0" max="255" value="128">
    </div>

    <!-- Image adjustments -->
    <div class="mb-3">
        <div class="section-label">Image Adjustments</div>
        <div class="compact-row">
            <label>Brightness</label>
            <input type="range" id="brightness" class="form-range" min="-100" max="100" value="0">
            <span class="val" id="brightnessVal">0</span>
        </div>
        <div class="compact-row">
            <label>Contrast</label>
            <input type="range" id="contrast" class="form-range" min="-100" max="100" value="0">
            <span class="val" id="contrastVal">0</span>
        </div>
        <div class="compact-row">
            <label>Gamma</label>
            <input type="range" id="gamma" class="form-range" min="0.1" max="3.0" step="0.05" value="1.0">
            <span class="val" id="gammaVal">1.00</span>
        </div>
        <div class="compact-row">
            <label>Blur</label>
            <input type="range" id="blur" class="form-range" min="0" max="20" step="0.5" value="0">
            <span class="val" id="blurVal">0</span>
        </div>
    </div>

    <!-- Zone mode -->
    <div class="mb-3">
        <div class="section-label">Zone Mode</div>
        <div class="btn-group w-100 mb-2" id="modeToggle" role="group">
            <button type="button" class="btn btn-sm btn-primary" id="modeBrightness">Brightness</button>
            <button type="button" class="btn btn-sm btn-outline-primary" id="modeHue">Hue</button>
        </div>

        <!-- Hue start (hue mode only) -->
        <div id="hueStartRow" style="display:none;">
            <div class="compact-row mb-2">
                <label>Hue start</label>
                <input type="range" id="hueStart" class="hue-slider w-100" min="0" max="359" value="0">
                <span class="val" id="hueStartVal">0°</span>
            </div>
        </div>

        <!-- Black zone (hue mode only) -->
        <div id="blackZoneContainer"></div>

        <!-- Zones count -->
        <div class="d-flex align-items-center gap-2 mb-2">
            <span class="section-label mb-0">Zones</span>
            <input type="number" id="numZones" class="form-control form-control-sm" style="width:70px;" value="1" min="1" max="8">
        </div>
        <div id="zonesContainer"></div>

        <!-- White zone (hue mode only) -->
        <div id="whiteZoneContainer"></div>

        <!-- Background zone -->
        <div class="form-check mb-1">
            <input class="form-check-input" type="checkbox" id="bgZoneEnabled">
            <label class="form-check-label small" for="bgZoneEnabled">Include background zone</label>
        </div>
        <div id="bgZoneContainer"></div>
    </div>

    <!-- Actions -->
    <div class="d-grid gap-2">
        <button id="generateBtn" class="btn btn-primary">Start Packing</button>
        <button id="downloadBtn" class="btn btn-success" disabled>Download SVG</button>
    </div>
    <p id="status" class="text-muted small mt-2 mb-0" style="min-height:1.2em;"></p>
</div>

<!-- Preview -->
<div id="preview">
    <svg id="outputSvg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>
</body>
</html>
