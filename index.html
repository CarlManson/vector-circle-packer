<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Packer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { overflow: hidden; }

        /* Sidebar desktop */
        @media (min-width: 768px) {
            #sidebar {
                height: 100vh !important;
                flex-shrink: 0;
                background-color: var(--bs-body-bg) !important;
                border-right: 1px solid var(--bs-border-color) !important;
            }
            #sidebar .offcanvas-body {
                display: flex !important;
                flex-direction: column !important;
                overflow: hidden !important;
                padding: 0 !important;
                height: 100% !important;
            }
        }

        /* Step navigation */
        .step-nav {
            display: flex;
            flex-shrink: 0;
            border-bottom: 1px solid var(--bs-border-color);
        }
        .step-btn {
            flex: 1;
            border: none;
            background: none;
            padding: .35rem .1rem .25rem;
            font-size: .65rem;
            font-weight: 500;
            line-height: 1.2;
            color: var(--bs-secondary-color);
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            cursor: pointer;
            text-align: center;
            transition: color .12s, background .12s;
        }
        .step-btn:hover:not(.active) { color: var(--bs-body-color); background: var(--bs-tertiary-bg); }
        .step-btn.active { color: var(--bs-primary); border-bottom-color: var(--bs-primary); font-weight: 700; }
        .step-btn .step-num { display: block; font-size: .82rem; font-weight: 700; line-height: 1; margin-bottom: .1rem; }

        /* Panels */
        .step-panel { flex: 1; overflow-y: auto; padding: 1rem; }

        /* Step footer */
        .step-footer {
            flex-shrink: 0;
            border-top: 1px solid var(--bs-border-color);
            padding: .5rem .75rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* Preview */
        #preview {
            flex: 1; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: var(--bs-secondary-bg);
            overflow: auto; padding: 1.5rem;
        }
        @media (max-width: 767.98px) { #preview { padding-top: 3.5rem; } }
        #outputSvg {
            max-width: 100%; max-height: 100%;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,.12);
            border-radius: 4px;
        }

        /* Zone swatches */
        .zone-swatch {
            display: inline-block; width: 14px; height: 14px;
            border-radius: 3px; border: 1px solid rgba(0,0,0,.2); flex-shrink: 0;
        }
        .zone-range { margin-left: auto; font-weight: 400; font-size: .75rem; color: var(--bs-secondary-color); }

        /* Compact form rows */
        .compact-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem; }
        .compact-row label { min-width: 54px; font-size: .8rem; margin: 0; white-space: nowrap; }
        .compact-row .form-range { flex: 1; }
        .compact-row .val { font-size: .75rem; color: var(--bs-secondary-color); min-width: 32px; text-align: right; }
        .compact-row .form-control { flex: 1; padding: .25rem .5rem; font-size: .85rem; }

        /* Neutral zone threshold row */
        .neutral-thresh-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
        .neutral-thresh-row label { min-width: 54px; font-size: .8rem; margin: 0; }
        .neutral-thresh-row .form-range { flex: 1; }
        .neutral-thresh-row .val { font-size: .75rem; color: var(--bs-secondary-color); min-width: 28px; text-align: right; }

        /* Section label */
        .section-label {
            font-size: .7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: .06em; color: var(--bs-secondary-color); margin-bottom: .35rem;
            display: block;
        }

        /* Zone summary strips (panel 3, brightness mode) */
        .zone-summary {
            display: flex; align-items: center; gap: .5rem;
            padding: .35rem .6rem; border-radius: .3rem; font-size: .85rem;
            margin-bottom: .25rem; background: var(--bs-tertiary-bg);
        }

        /* Accordion tweaks */
        .accordion-button { font-size: .85rem; padding: .55rem .75rem; }
        .accordion-button .zone-range { margin-left: auto; margin-right: .4rem; font-weight: 400; font-size: .75rem; }
        .accordion-body { padding: .6rem .75rem; }

        /* Neutral zone card */
        .zone-card { margin-bottom: .5rem; }
        .zone-card .card-header {
            padding: .4rem .75rem; font-size: .85rem; font-weight: 600;
            display: flex; align-items: center; gap: .5rem;
        }
        .zone-card .card-body { padding: .6rem .75rem; }
        .neutral-range { margin-left: auto; font-weight: 400; font-size: .75rem; color: var(--bs-secondary-color); }
    </style>
</head>
<body class="d-flex">

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<!-- Mobile toggle -->
<button class="d-md-none btn btn-sm btn-light border shadow-sm position-fixed top-0 start-0 m-2"
        style="z-index:1051;" type="button"
        data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar">&#9776;</button>

<!-- Sidebar -->
<div id="sidebar" class="offcanvas-md offcanvas-start bg-body border-end"
     style="--bs-offcanvas-width:320px;" tabindex="-1" aria-labelledby="sidebarLabel">

    <div class="offcanvas-header d-md-none border-bottom py-2">
        <h6 class="offcanvas-title mb-0" id="sidebarLabel">Circle Packer</h6>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebar"></button>
    </div>

    <div class="offcanvas-body">

        <!-- Step navigation -->
        <div class="step-nav">
            <button class="step-btn active" data-step="0"><span class="step-num">1</span>Image</button>
            <button class="step-btn"        data-step="1"><span class="step-num">2</span>Mode</button>
            <button class="step-btn"        data-step="2"><span class="step-num">3</span>Zones</button>
            <button class="step-btn"        data-step="3"><span class="step-num">4</span>Circles</button>
        </div>

        <!-- Panel 1: Image & Adjustments -->
        <div class="step-panel" id="panel0">
            <div class="mb-3">
                <label class="section-label">Image</label>
                <input type="file" id="imageUpload" class="form-control form-control-sm" accept="image/png,image/jpeg">
            </div>
            <div>
                <div class="section-label">Adjustments</div>
                <div class="compact-row">
                    <label>Brightness</label>
                    <input type="range" id="brightness" class="form-range" min="-100" max="100" value="0">
                    <span class="val" id="brightnessVal">0</span>
                </div>
                <div class="compact-row">
                    <label>Contrast</label>
                    <input type="range" id="contrast" class="form-range" min="-100" max="100" value="0">
                    <span class="val" id="contrastVal">0</span>
                </div>
                <div class="compact-row">
                    <label>Gamma</label>
                    <input type="range" id="gamma" class="form-range" min="0.1" max="3.0" step="0.05" value="1.0">
                    <span class="val" id="gammaVal">1.00</span>
                </div>
                <div class="compact-row">
                    <label>Blur</label>
                    <input type="range" id="blur" class="form-range" min="0" max="20" step="0.5" value="0">
                    <span class="val" id="blurVal">0</span>
                </div>
            </div>
        </div>

        <!-- Panel 2: Mode & Zones setup -->
        <div class="step-panel d-none" id="panel1">
            <div class="mb-3">
                <div class="section-label">Zone Mode</div>
                <div class="btn-group w-100" id="modeToggle" role="group">
                    <button type="button" class="btn btn-sm btn-primary" id="modeBrightness">Brightness</button>
                    <button type="button" class="btn btn-sm btn-outline-primary" id="modeHue">Hue</button>
                </div>
            </div>
            <div class="d-flex align-items-center gap-2 mb-3">
                <span class="section-label mb-0">Number of zones</span>
                <input type="number" id="numZones" class="form-control form-control-sm" style="width:70px;" value="1" min="1" max="8">
            </div>
            <div id="thresholdSection" class="mb-3">
                <label class="section-label">Threshold <span class="float-end fw-normal" id="thresholdVal">128</span></label>
                <input type="range" id="threshold" class="form-range" min="0" max="255" value="128">
                <div class="text-muted small mt-1">Pixels above this luminance are excluded (background).</div>
            </div>
            <!-- Pre-calculated zone summary -->
            <div id="zoneSummaryContainer"></div>
        </div>

        <!-- Panel 3: Zone Config (hue wheel / neutral zones) -->
        <div class="step-panel d-none" id="panel2">
            <!-- Hue: colour wheel + neutral zones -->
            <div id="panel2Hue" class="d-none">
                <div id="hueWheelContainer"></div>
                <div id="blackZoneContainer"></div>
                <div id="whiteZoneContainer"></div>
            </div>
            <!-- Brightness: nothing to configure here -->
            <div id="panel2Brightness">
                <p class="text-muted small">Zones are equal luminance bands. Proceed to step 4 to configure circle sizes and colours.</p>
            </div>
        </div>

        <!-- Panel 4: Circle Config -->
        <div class="step-panel d-none" id="panel3">
            <div class="accordion accordion-flush border rounded" id="zonesAccordion"></div>
            <div id="bgZoneSection" class="mt-2">
                <div class="form-check mb-1">
                    <input class="form-check-input" type="checkbox" id="bgZoneEnabled">
                    <label class="form-check-label small" for="bgZoneEnabled">Background zone (above threshold)</label>
                </div>
                <div id="bgZoneContainer"></div>
            </div>
            <hr class="my-2">
            <div class="d-grid gap-2">
                <button id="generateBtn" class="btn btn-primary">Generate Circles</button>
                <button id="downloadBtn" class="btn btn-success" disabled>Download SVG</button>
                <button id="resetBtn" class="btn btn-outline-secondary btn-sm">Reset All Settings</button>
            </div>
            <p id="status" class="text-muted small mt-2 mb-0" style="min-height:1.2em;"></p>
        </div>

        <!-- Step footer -->
        <div class="step-footer">
            <button id="prevBtn" class="btn btn-outline-secondary btn-sm" disabled>← Back</button>
            <span id="stepLabel" class="text-muted small mx-auto">Step 1 of 4</span>
            <button id="nextBtn" class="btn btn-primary btn-sm">Next →</button>
        </div>

    </div><!-- /offcanvas-body -->
</div><!-- /sidebar -->

<!-- Preview -->
<div id="preview">
    <svg id="outputSvg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>
</body>
</html>
