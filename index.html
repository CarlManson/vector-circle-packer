<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stochastic Circle Packer</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            margin: 0;
            height: 100vh;
            background-color: #f4f4f4;
            colour: #333;
        }
        .sidebar {
            width: 320px;
            padding: 20px;
            background: #fff;
            border-right: 1px solid #ccc;
            box-sizing: border-box;
        }
        .main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: auto;
        }
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="file"], input[type="number"], input[type="range"] {
            width: 100%;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            colour: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }
        button:hover { background: #0056b3; }
        svg {
            max-width: 100%;
            max-height: 100%;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Circle Packer</h2>
    <div class="control-group">
        <label for="imageUpload">Upload Image</label>
        <input type="file" id="imageUpload" accept="image/png, image/jpeg">
    </div>
    <div class="control-group">
        <label for="minRadius">Minimum Radius (px)</label>
        <input type="number" id="minRadius" value="2" min="1">
    </div>
    <div class="control-group">
        <label for="threshold">Black/White Threshold</label>
        <input type="range" id="threshold" min="0" max="255" value="128">
    </div>
    <button id="generateBtn">Start Packing</button>
</div>

<div class="main">
    <canvas id="hiddenCanvas" style="display: none;"></canvas>
    <svg id="outputSvg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    const ctx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
    const outputSvg = document.getElementById('outputSvg');
    const thresholdInput = document.getElementById('threshold');
    const generateBtn = document.getElementById('generateBtn');

    let imageWidth = 0;
    let imageHeight = 0;
    let binaryMap = [];

    // Handle Image Upload
    imageUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                imageWidth = img.width;
                imageHeight = img.height;
                hiddenCanvas.width = imageWidth;
                hiddenCanvas.height = imageHeight;

                // Prepare the SVG canvas to match the image dimensions
                outputSvg.setAttribute('viewBox', `0 0 ${imageWidth} ${imageHeight}`);
                outputSvg.innerHTML = '';

                // Draw the image onto the hidden canvas
                ctx.drawImage(img, 0, 0);
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    // Handle Processing when the button is clicked
    generateBtn.addEventListener('click', function() {
        if (imageWidth === 0 || imageHeight === 0) {
            alert("Please upload an image first.");
            return;
        }
        processImage();
    });

    function processImage() {
        const imageData = ctx.getImageData(0, 0, imageWidth, imageHeight);
        const data = imageData.data;
        const threshold = parseInt(thresholdInput.value, 10);

        // Initialise a 2D array to hold our binary map (true = target area, false = empty)
        binaryMap = new Array(imageWidth).fill(0).map(() => new Array(imageHeight).fill(false));

        for (let y = 0; y < imageHeight; y++) {
            for (let x = 0; x < imageWidth; x++) {
                const index = (y * imageWidth + x) * 4;
                const r = data[index];
                const g = data[index + 1];
                const b = data[index + 2];

                // Calculate luminance to convert to greyscale
                const luminance = (r * 0.299 + g * 0.587 + b * 0.114);

                // Binarise: If the pixel is darker than the threshold, it is a valid space for a circle
                if (luminance < threshold) {
                    binaryMap[x][y] = true;
                }
            }
        }

        console.log("Image binarised successfully.");
        // Next up: The Distance Map and Circle Packing algorithm
    }
</script>
</body>
</html>
