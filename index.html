<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Packer</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            margin: 0;
            height: 100vh;
            background-color: #f4f4f4;
            color: #333;
        }
        .sidebar {
            width: 320px;
            padding: 20px;
            background: #fff;
            border-right: 1px solid #ccc;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: auto;
        }
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        .label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .label-row label { margin-bottom: 0; }
        .label-value { font-size: 0.85em; color: #666; }
        input[type="file"], input[type="number"], input[type="range"] {
            width: 100%;
            box-sizing: border-box;
        }
        input[type="number"] { padding: 6px; }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        #downloadBtn { background: #28a745; }
        #downloadBtn:hover { background: #1e7e34; }
        #status {
            margin-top: 12px;
            font-size: 0.85em;
            color: #555;
            min-height: 1.2em;
        }
        svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .radio-group { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
        .radio-group label { font-weight: normal; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        input[type="color"] { width: 100%; height: 36px; padding: 2px; box-sizing: border-box; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
        .adj-row { display: grid; grid-template-columns: 72px 1fr 36px; align-items: center; gap: 6px; margin-top: 6px; }
        .adj-row span:first-child { font-size: 0.85em; }
        .adj-val { font-size: 0.8em; color: #666; text-align: right; }
        /* Zone panels */
        #zonesContainer { margin-top: 8px; }
        .zone-panel { border: 1px solid #ddd; border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
        .zone-header { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: #f5f5f5; font-weight: bold; font-size: 0.9em; border-bottom: 1px solid #ddd; }
        .zone-swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid #bbb; flex-shrink: 0; }
        .zone-range { font-weight: normal; color: #888; font-size: 0.8em; margin-left: auto; }
        .zone-body { padding: 8px 10px; }
        .zone-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .zone-row span { min-width: 48px; font-size: 0.85em; }
        .zone-row input[type="number"] { flex: 1; padding: 4px 6px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Circle Packer</h2>
    <div class="control-group">
        <label for="imageUpload">Upload Image</label>
        <input type="file" id="imageUpload" accept="image/png, image/jpeg">
    </div>
    <div class="control-group">
        <div class="label-row">
            <label for="threshold">Threshold (max luminance)</label>
            <span class="label-value" id="thresholdVal">128</span>
        </div>
        <input type="range" id="threshold" min="0" max="255" value="128">
    </div>
    <div class="control-group">
        <label>Image Adjustments</label>
        <div class="adj-row">
            <span>Brightness</span>
            <input type="range" id="brightness" min="-100" max="100" value="0">
            <span class="adj-val" id="brightnessVal">0</span>
        </div>
        <div class="adj-row">
            <span>Contrast</span>
            <input type="range" id="contrast" min="-100" max="100" value="0">
            <span class="adj-val" id="contrastVal">0</span>
        </div>
        <div class="adj-row">
            <span>Gamma</span>
            <input type="range" id="gamma" min="0.1" max="3.0" step="0.05" value="1.0">
            <span class="adj-val" id="gammaVal">1.00</span>
        </div>
        <div class="adj-row">
            <span>Blur</span>
            <input type="range" id="blur" min="0" max="20" step="0.5" value="0">
            <span class="adj-val" id="blurVal">0</span>
        </div>
    </div>
    <div class="control-group">
        <div class="label-row">
            <label for="numZones">Zones</label>
        </div>
        <input type="number" id="numZones" value="1" min="1" max="8">
        <div id="zonesContainer"></div>
        <label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-weight:normal;cursor:pointer;">
            <input type="checkbox" id="bgZoneEnabled"> Include background zone
        </label>
        <div id="bgZoneContainer"></div>
    </div>
    <button id="generateBtn">Start Packing</button>
    <button id="downloadBtn" disabled>Download SVG</button>
    <div id="status"></div>
</div>

<div class="main">
    <canvas id="hiddenCanvas" style="display: none;"></canvas>
    <svg id="outputSvg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<script src="main.js"></script>
</body>
</html>
